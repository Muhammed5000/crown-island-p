<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Crown Island — Offline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a132a" />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        background: #050a1a;
        color: #f5f0dc;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      main {
        max-width: 26rem;
        padding: 2rem;
      }
      h1 {
        color: #deba2e;
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #9ca8c7;
        margin: 0 0 0.75rem;
        line-height: 1.6;
      }
      .crown {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }
      .hint {
        font-size: 0.85rem;
        color: #6b779b;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1.4rem;
        border-radius: 999px;
        border: 1px solid rgba(222, 186, 46, 0.4);
        background: transparent;
        color: #deba2e;
        font: inherit;
        font-size: 0.9rem;
        cursor: pointer;
      }
      button:hover {
        background: rgba(222, 186, 46, 0.1);
      }
      .status {
        margin-top: 0.9rem;
        font-size: 0.8rem;
        color: #6b779b;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="crown">👑</div>
      <h1>Crown Island</h1>
      <p>
        انقطع اتصالك بالإنترنت.<br />
        You've lost your internet connection.
      </p>
      <p class="hint">
        نظام الفرع يعمل على الشبكة المحلية — افتحه عبر عنوان الشبكة المحلية للفرع للمتابعة دون
        إنترنت.<br />
        The venue system keeps running on the local network — open it via the venue's LAN
        address to keep working offline.
      </p>
      <button type="button" id="retry">إعادة المحاولة · Retry</button>
      <div class="status" id="status"></div>
    </main>
    <script>
      // Auto-recover: as soon as the server is reachable again, reload back into
      // the app. We only reload AFTER a successful probe, so we never loop back to
      // this page while still offline.
      var statusEl = document.getElementById('status');
      var probing = false;
      async function probe() {
        if (probing) return;
        probing = true;
        try {
          var res = await fetch('/api/health', { cache: 'no-store' });
          if (res && res.ok) {
            statusEl.textContent = 'متصل · Reconnected — reloading…';
            // In the normal flow the SW served THIS page as a fallback while the
            // address bar kept the real page, so reload returns to it. If the URL
            // literally is /offline.html (direct visit) reload would loop, so send
            // to home instead.
            if (location.pathname === '/offline.html') location.replace('/');
            else location.reload();
            return;
          }
        } catch (e) {
          /* still offline */
        } finally {
          probing = false;
        }
      }
      document.getElementById('retry').addEventListener('click', probe);
      window.addEventListener('online', probe);
      setInterval(probe, 4000);
      probe();
    </script>
  </body>
</html>
